<div class="container">
<mat-toolbar *ngIf="userActive">
    <div class="sidenav-content">
        <button mat-icon-button class="example-icon"
            aria-label="Example icon-button with menu icon" (click)="drawer.toggle()">
            <mat-icon>menu</mat-icon>
        </button>
    </div>
    <span>Expense Splitter</span>
    <div class="userIcn" *ngIf="userActive"><button mat-button [matMenuTriggerFor]="menu"><mat-icon>account_circle</mat-icon><span class="color:white">{{userName}}<mat-icon class="downArrow">arrow_drop_down</mat-icon></span>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>My account</button>
      <button mat-menu-item (click)="logOutUser()">Log out</button>
    </mat-menu></button></div>
</mat-toolbar>
<div class="body">
    <mat-drawer-container class="example-container" autosize>
        <mat-drawer #drawer class="example-sidenav" mode="side">
          <!-- <p>Auto-resizing sidenav</p> -->
          <!-- @if (showFiller) {
            <p>Lorem, ipsum dolor sit amet consectetur.</p>
          } -->
          <span class="drawerIcons" routerLink="" (click)="drawer.toggle()" mat-raised-button>
            Home
          </span>
          <span class="drawerIcons" routerLink="{{this.id}}/trips" (click)="drawer.toggle()" mat-raised-button>
            My Trips
          </span>
          <span class="drawerIcons"  (click)="drawer.toggle()" mat-raised-button>
            Expenses
          </span>
          <span class="drawerIcons"  (click)="drawer.toggle()" mat-raised-button>
            Settings
          </span>
          <span class="drawerIcons" (click)="drawer.toggle()" mat-raised-button>
            Log out
          </span>
        </mat-drawer>
      
        <!-- <div class="example-sidenav-content">
          <button type="button" mat-button >
            Toggle sidenav
          </button>
        </div> -->
        <router-outlet *ngIf="!shouldRun"></router-outlet>
      </mat-drawer-container>
      
    

</div>
</div>
