<form [formGroup]="loginForm" (submit)="logInUser(email.value,password.value)">
<div class="formContent">
    <h2>Login</h2>
<mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput type="text" formControlName="emailId"/>
    <small *ngIf="isEmailFormatInvalid()">invalid Email</small>
</mat-form-field>


<mat-form-field>
    <mat-label>Password</mat-label>
    <input matInput type="password" formControlName="password">
</mat-form-field>
<span>Don't have an account? <a href="signUp">Create one</a></span>
<span>or</span>
<button mat-button class="googleSignIn"><mat-icon class="googleIcon"></mat-icon> Sign in with Google</button>
<button mat-button class="logIn" type="submit"> Log in </button>
</div>
</form>
